# Update app to a unique Fly app name before the first deploy if needed.
app = "newportfoliomanagementtool"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health/db"

[[vm]]
  size = "shared-cpu-1x"
